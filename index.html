<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emmanuel Phone Shop</title>
<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header { background:#111; color:white; padding:15px; text-align:center; }
.container { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap:15px; padding:15px; }
.card { background:white; border-radius:10px; padding:10px; box-shadow:0 2px 5px rgba(0,0,0,0.2); }
.card img { width:100%; border-radius:10px; }
.card:hover { transform: scale(1.05); transition:0.3s; }
h3 { margin:10px 0 5px; }
.btn { display:block; text-align:center; background:#25D366; color:white; padding:10px; border-radius:5px; text-decoration:none; margin-top:10px; }
.cart-btn { background:#ff9900; }
.search { width:90%; margin:10px auto; display:block; padding:10px; border-radius:5px; border:1px solid #ccc; }
.cart { position:fixed; top:10px; right:10px; background:black; color:white; padding:10px; border-radius:5px; }
</style><script>
let cart = [];

function searchPhones() {
 let input = document.getElementById('search').value.toLowerCase();
 let cards = document.getElementsByClassName('card');
 for (let i = 0; i < cards.length; i++) {
 let title = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
 cards[i].style.display = title.includes(input) ? "block" : "none";
 }
}

function addToCart(name, price) {
 cart.push({name, price});
 updateCart();
}

function updateCart() {
 let total = cart.reduce((sum, item) => sum + item.price, 0);
 document.getElementById('cart').innerText = "Cart: " + cart.length + " items | GHS " + total;
}

function checkout() {
 let message = "Order Details:%0A";
 cart.forEach(item => {
 message += item.name + " - GHS " + item.price + "%0A";
 });
 window.open("https://wa.me/233XXXXXXXXX?text=" + message);
}
</script></head>
<body><header>
<h1>Emmanuel Phone Shop</h1>
<p>Online Store - Order Instantly</p>
</header><div id="cart" class="cart">Cart: 0 items</div><input type="text" id="search" class="search" placeholder="Search phones..." onkeyup="searchPhones()"><div class="container"><div class="card">
<img src="https://via.placeholder.com/300">
<h3>iPhone 11</h3>
<p>GHS 2500</p>
<button class="btn cart-btn" onclick="addToCart('iPhone 11', 2500)">Add to Cart</button>
</div><div class="card">
<img src="https://via.placeholder.com/300">
<h3>iPhone 13</h3>
<p>GHS 4500</p>
<button class="btn cart-btn" onclick="addToCart('iPhone 13', 4500)">Add to Cart</button>
</div><div class="card">
<img src="https://via.placeholder.com/300">
<h3>Samsung Galaxy A14</h3>
<p>GHS 1800</p>
<button class="btn cart-btn" onclick="addToCart('Samsung A14', 1800)">Add to Cart</button>
</div><div class="card">
<img src="https://via.placeholder.com/300">
<h3>Samsung Galaxy A54</h3>
<p>GHS 3200</p>
<button class="btn cart-btn" onclick="addToCart('Samsung A54', 3200)">Add to Cart</button>
</div></div><div style="padding:20px; text-align:center;">
<button class="btn" onclick="checkout()">Checkout via WhatsApp</button>
</div></body>
</html>
